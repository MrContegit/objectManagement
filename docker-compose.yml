version: '3.9'

services:
  backend:
    build:
      context: ./object-management-backend
      dockerfile: Dockerfile
    container_name: object-management-backend
    ports:
      - '3001:3000'
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/object-management
      - CORS_ORIGIN=http://localhost:4000
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=objects
      - S3_REGION=us-east-1
      - PUBLIC_S3_URL=http://localhost:9000
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
        - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
    container_name: object-management-frontend
    ports:
      - '4000:3000'
    environment:
      - INTERNAL_API_URL=http://backend:3000
    depends_on:
      - backend

  mongodb:
    image: mongo:7
    container_name: object-management-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand({ping: 1})']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: object-management-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  mongodb_data:
  minio_data: